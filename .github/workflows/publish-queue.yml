name: Pull, sign & publish (queue)

# Polls mixlar.net for approved submissions, signs them, lists them, and pushes
# the fresh catalog back — so the server never needs GitHub credentials.
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch: {}

concurrency:
  group: sign-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install SDK (signer + scanner)
        run: pip install --quiet "mixlar-sdk>=0.3.0"

      - name: Pull approved submissions
        env:
          MIXLAR_QUEUE_URL: ${{ vars.MIXLAR_QUEUE_URL }}
          REGISTRY_CALLBACK_SECRET: ${{ secrets.REGISTRY_CALLBACK_SECRET }}
        run: python scripts/pull_queue.py

      - name: Sign & rebuild catalog
        env:
          MIXLAR_SIGNING_KEY: ${{ secrets.MIXLAR_SIGNING_KEY }}
        run: python scripts/sign_and_publish.py

      - name: Commit results
        run: |
          git config user.name  "mixlar-registry[bot]"
          git config user.email "registry@mixlar.net"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "registry: sign & publish approved submissions"
            git push
          else
            echo "Nothing to publish."
          fi

      - name: Report back to mixlar.net (results + catalog)
        if: always()
        env:
          MIXLAR_CALLBACK_URL: ${{ vars.MIXLAR_CALLBACK_URL }}
          REGISTRY_CALLBACK_SECRET: ${{ secrets.REGISTRY_CALLBACK_SECRET }}
        run: python scripts/callback.py
