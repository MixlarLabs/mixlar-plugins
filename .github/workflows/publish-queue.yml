name: Pull, sign & publish (queue)

# Two-stage, key-protected publishing:
#   1. `check` (ungated) peeks the queue — no signing key, no approval.
#   2. `sign`  runs ONLY when there's work, in the `signing` environment, which
#      requires a human reviewer to approve before the signing key is released.
# So even a compromised push can't auto-sign: the key never enters a job until a
# maintainer approves the deployment in GitHub.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: sign-publish
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_work: ${{ steps.peek.outputs.has_work }}
    steps:
      - name: Peek the queue (no key, no approval)
        id: peek
        env:
          MIXLAR_QUEUE_URL: ${{ vars.MIXLAR_QUEUE_URL }}
          REGISTRY_CALLBACK_SECRET: ${{ secrets.REGISTRY_CALLBACK_SECRET }}
        run: |
          n=$(curl -s -X POST "$MIXLAR_QUEUE_URL?peek=1" \
                -H "Authorization: Bearer $REGISTRY_CALLBACK_SECRET" | jq -r '.count // 0')
          echo "approved submissions waiting: $n"
          if [ "${n:-0}" -gt 0 ]; then echo "has_work=true" >> "$GITHUB_OUTPUT"; else echo "has_work=false" >> "$GITHUB_OUTPUT"; fi

  sign:
    needs: check
    if: needs.check.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    # The gate: this job can't start until a required reviewer approves it in
    # GitHub, and only then is MIXLAR_SIGNING_KEY (an environment secret) exposed.
    environment: signing
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install SDK (signer + scanner)
        run: pip install --quiet "mixlar-sdk[render]>=0.3.0"

      - name: Pull approved submissions
        env:
          MIXLAR_QUEUE_URL: ${{ vars.MIXLAR_QUEUE_URL }}
          REGISTRY_CALLBACK_SECRET: ${{ secrets.REGISTRY_CALLBACK_SECRET }}
        run: python scripts/pull_queue.py

      - name: Sign & rebuild catalog
        env:
          MIXLAR_SIGNING_KEY: ${{ secrets.MIXLAR_SIGNING_KEY }}
        run: python scripts/sign_and_publish.py

      - name: Commit results
        run: |
          git config user.name  "mixlar-registry[bot]"
          git config user.email "registry@mixlar.net"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "registry: sign & publish approved submissions"
            # Rebase onto anything that landed while this run was queued, then
            # push with retries — avoids the stale-checkout (fetch first) reject.
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed; retrying"; sleep 5
            done
          else
            echo "Nothing to publish."
          fi

      - name: Report back to mixlar.net (results + catalog)
        # Only after a SUCCESSFUL commit+push — otherwise we'd mark plugins live
        # (and delete their staged files) for a push that never landed.
        env:
          MIXLAR_CALLBACK_URL: ${{ vars.MIXLAR_CALLBACK_URL }}
          REGISTRY_CALLBACK_SECRET: ${{ secrets.REGISTRY_CALLBACK_SECRET }}
        run: python scripts/callback.py
